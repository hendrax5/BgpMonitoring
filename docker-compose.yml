version: '3.8'

services:
  librenms-dashboard:
    build: .
    container_name: librenms_dashboard
    restart: unless-stopped
    ports:
      - "514:514/udp"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: librenms_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pg_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgpmon -d bgpmon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: librenms_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: bgpmon_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - librenms-dashboard

volumes:
  pg_data_v2:
  redis_data:
  caddy_data:
  caddy_config:
