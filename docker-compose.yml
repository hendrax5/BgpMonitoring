version: '3.8'

services:
  librenms-dashboard:
    build: .
    container_name: librenms_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://bgpmon:bgpmon_secret@postgres:5432/bgpmon
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_very_long_random_secret_key}
      - SUPERADMIN_USERNAME=${SUPERADMIN_USERNAME:-superadmin}
      - SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD:-superadmin123}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: librenms_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=bgpmon
      - POSTGRES_PASSWORD=bgpmon_secret
      - POSTGRES_DB=bgpmon
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgpmon -d bgpmon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: librenms_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
